version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist FAISS index, corpus chunks, and all generated data files
      - ./data:/app/data
      # Source documents (PDF / DOCX) read by the pipeline
      - ./documents:/app/documents
      # Cache downloaded HuggingFace models so they survive container restarts
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 600s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Browser-visible URL — keep http://localhost:8000 for local use.
        # Change to your server address for remote deployments.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Named volume for HuggingFace model cache (~several GB on first startup)
  hf_cache:
